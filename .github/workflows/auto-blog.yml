name: Auto Generate Blog Post

on:
  schedule:
    - cron: '0 9 * * 0' # Every Sunday at 9:00 AM UTC
  workflow_dispatch: {} # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up server
        run: curl -s --max-time 60 "${{ secrets.APP_URL }}/api/blog" > /dev/null || true

      - name: Wait for server startup
        run: sleep 5

      - name: Generate blog post
        run: |
          response=$(curl -s -w "\n%{http_code}" --max-time 120 -X POST \
            "${{ secrets.APP_URL }}/api/blog/auto-generate" \
            -H "Authorization: Bearer ${{ secrets.BLOG_AUTO_GENERATE_SECRET }}" \
            -H "Content-Type: application/json")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" != "201" ]; then
            echo "Failed to generate blog post"
            exit 1
          fi
